<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>The Sunken Pirate Wreck &ndash; Dive Within Your Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Luckiest+Guy&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0714;
    --slime:#8bff5a;
    --purple:#7b2ff7;
    --grape:#2a1055;
    --torch:#ffb64a;
    --danger:#ff3b6b;
    --sea:#0b3a5b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#000;font-family:'Nunito',system-ui,sans-serif;color:#fff;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  #game{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}

  /* underwater tint + vignette */
  #tint{position:absolute;inset:0;pointer-events:none;mix-blend-mode:soft-light;
    background:radial-gradient(120% 90% at 50% 0%, rgba(120,220,255,.35), rgba(0,20,40,.0) 55%);opacity:0;transition:opacity 1s}
  #vig{position:absolute;inset:0;pointer-events:none;
    box-shadow:inset 0 0 220px 60px rgba(0,0,0,.72), inset 0 0 60px 10px rgba(0,0,0,.35)}
  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}

  /* HUD */
  #hud{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .5s;font-weight:800}
  #hud.on{opacity:1}
  .gauge{position:absolute;left:16px;bottom:16px;width:190px;background:rgba(6,2,16,.55);border:2px solid rgba(255,255,255,.25);border-radius:14px;padding:10px 12px;backdrop-filter:blur(3px)}
  .gauge .lab{font-size:11px;letter-spacing:.14em;opacity:.8;text-transform:uppercase}
  .bar{height:14px;margin-top:6px;border-radius:8px;background:#20122e;overflow:hidden;border:1px solid rgba(255,255,255,.15)}
  .bar > i{display:block;height:100%;width:100%;border-radius:8px;
    background:linear-gradient(90deg,#3bff9d,#c7ff3b);transition:width .12s linear}
  #airval{font-family:'Luckiest Guy';font-size:22px;line-height:1}
  #stats{position:absolute;right:16px;top:16px;text-align:right;font-size:13px;letter-spacing:.05em}
  #stats span{display:inline-block;background:rgba(6,2,16,.55);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;margin:0 0 8px 8px}
  #torchpill{color:#ffd89b}
  /* compass */
  #compass{position:absolute;right:18px;bottom:18px;width:96px;height:96px;border-radius:50%;
    background:radial-gradient(circle,#10203a,#050b16);border:3px solid rgba(255,255,255,.35);
    box-shadow:0 6px 24px rgba(0,0,0,.5);display:none;place-items:center}
  #compass .card{position:absolute;font-size:10px;font-weight:900;color:#cfe6ff;opacity:.7}
  #compass .n{top:5px}#compass .s{bottom:5px}#compass .e{right:6px;top:44px}#compass .w{left:6px;top:44px}
  #needle{width:6px;height:70px;transform-origin:50% 50%}
  #needle .red{position:absolute;top:0;left:0;width:6px;height:35px;background:linear-gradient(#ff3b6b,#a10e2c);border-radius:3px 3px 0 0}
  #needle .wht{position:absolute;bottom:0;left:0;width:6px;height:35px;background:linear-gradient(#eef,#889);border-radius:0 0 3px 3px}
  #objective{position:absolute;left:50%;top:16px;transform:translateX(-50%);text-align:center;
    background:rgba(6,2,16,.6);border:1px solid rgba(139,255,90,.4);border-radius:30px;padding:8px 20px;
    font-family:'Luckiest Guy';letter-spacing:.04em;color:var(--slime);text-shadow:0 2px 0 rgba(0,0,0,.6);font-size:16px}

  /* narration ticker */
  #narr{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);width:min(760px,90%);
    text-align:center;font-size:19px;font-weight:800;line-height:1.35;
    text-shadow:0 2px 10px rgba(0,0,0,.9);opacity:0;transition:opacity .6s;pointer-events:none}
  #narr.on{opacity:1}

  /* screen overlays (title / choices / endings) */
  #screen{position:absolute;inset:0;display:none;place-items:center;padding:20px;
    background:radial-gradient(120% 120% at 50% -10%, rgba(60,10,90,.55), rgba(2,2,10,.86) 70%)}
  #screen.on{display:grid}
  .panel{width:min(880px,96%);text-align:center;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{from{transform:scale(.8) rotate(-1deg);opacity:0}to{transform:none;opacity:1}}
  .kicker{font-family:'Creepster';letter-spacing:.08em;color:var(--slime);font-size:clamp(20px,4vw,34px);
    text-shadow:0 0 18px rgba(139,255,90,.5)}
  h1.title{font-family:'Creepster';font-size:clamp(42px,10vw,104px);line-height:.95;letter-spacing:.02em;
    color:#fff;text-shadow:0 0 24px rgba(123,47,247,.9), 6px 6px 0 #3a0f6e;margin:6px 0 4px}
  .sub{font-size:clamp(15px,2.4vw,20px);opacity:.92;max-width:640px;margin:8px auto 0;font-weight:700}
  h2.big{font-family:'Luckiest Guy';font-size:clamp(30px,7vw,66px);line-height:1;margin:0 0 6px;
    text-shadow:4px 4px 0 rgba(0,0,0,.45)}
  .win h2{color:#7dff9b;text-shadow:0 0 26px rgba(60,255,120,.6),4px 4px 0 rgba(0,0,0,.4)}
  .lose h2{color:var(--danger);text-shadow:0 0 26px rgba(255,60,110,.6),4px 4px 0 rgba(0,0,0,.4)}
  .cards{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-top:26px}
  .card-btn{width:min(360px,92%);cursor:pointer;text-align:left;
    background:linear-gradient(180deg,#1b1030,#120a24);border:3px solid rgba(255,255,255,.14);
    border-radius:20px;padding:20px 20px 18px;transition:transform .15s, border-color .15s, box-shadow .15s;pointer-events:auto}
  .card-btn:hover{transform:translateY(-6px) rotate(-.6deg);border-color:var(--slime);
    box-shadow:0 18px 40px rgba(0,0,0,.5), 0 0 0 4px rgba(139,255,90,.12)}
  .card-btn .ico{font-size:40px}
  .card-btn h3{font-family:'Luckiest Guy';font-size:22px;margin:8px 0 2px;letter-spacing:.02em}
  .card-btn.good h3{color:#8bff5a}.card-btn.bad h3{color:#ff8fa6}
  .card-btn p{font-size:14px;font-weight:600;opacity:.86;line-height:1.4}
  .tag{display:inline-block;font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
    padding:3px 10px;border-radius:20px;margin-top:12px}
  .tag.warn{background:rgba(255,59,107,.16);color:#ff9fb2;border:1px solid rgba(255,59,107,.5)}
  .tag.safe{background:rgba(139,255,90,.14);color:#bfff9a;border:1px solid rgba(139,255,90,.5)}
  .btn{cursor:pointer;pointer-events:auto;font-family:'Luckiest Guy';font-size:20px;letter-spacing:.03em;
    color:#1a0b2e;background:linear-gradient(180deg,#ffd23f,#ff9f1c);border:none;border-radius:16px;
    padding:14px 30px;margin:26px 8px 0;box-shadow:0 8px 0 #a85c00, 0 12px 22px rgba(0,0,0,.4);transition:transform .1s}
  .btn:active{transform:translateY(4px);box-shadow:0 4px 0 #a85c00}
  .btn.ghost{background:linear-gradient(180deg,#3a2a5e,#241640);color:#fff;box-shadow:0 8px 0 #150a2c,0 12px 22px rgba(0,0,0,.4)}
  .lesson{margin:22px auto 0;max-width:640px;font-size:15px;font-weight:800;line-height:1.5;
    background:rgba(139,255,90,.08);border:1px solid rgba(139,255,90,.35);border-radius:16px;padding:14px 18px}
  .lesson b{color:var(--slime)}
  .credit{position:absolute;left:0;right:0;bottom:14px;text-align:center;font-size:12px;opacity:.5}

  /* touch dpad + look hint */
  #pad{position:absolute;left:14px;bottom:120px;display:none;grid-template-columns:repeat(3,56px);
    grid-template-rows:repeat(2,56px);gap:8px;pointer-events:none;z-index:5}
  #pad.on{display:grid}
  #pad button{pointer-events:auto;width:56px;height:56px;border-radius:14px;font-size:22px;color:#fff;
    background:rgba(20,10,40,.6);border:2px solid rgba(255,255,255,.25);backdrop-filter:blur(3px)}
  #pad button:active{background:rgba(139,255,90,.35)}
  .b-up{grid-column:2;grid-row:1}.b-left{grid-column:1;grid-row:2}.b-down{grid-column:2;grid-row:2}.b-right{grid-column:3;grid-row:2}
  #lookhint{position:absolute;left:50%;bottom:60px;transform:translateX(-50%);font-size:13px;font-weight:800;
    opacity:0;transition:opacity .4s;pointer-events:none;background:rgba(6,2,16,.55);padding:6px 14px;border-radius:20px}
  #lookhint.on{opacity:.85}

  /* always-available exit + a contextual action button */
  #exitbtn{position:absolute;left:14px;top:14px;display:none;z-index:8;pointer-events:auto;cursor:pointer;
    font-family:'Nunito';font-weight:900;font-size:13px;letter-spacing:.03em;color:#fff;
    background:rgba(10,4,22,.6);border:2px solid rgba(255,255,255,.28);border-radius:12px;padding:8px 14px;backdrop-filter:blur(3px)}
  #exitbtn:hover{border-color:var(--danger);color:#ffb6c6}
  #playbtn{position:absolute;left:50%;bottom:150px;transform:translateX(-50%);display:none;z-index:8;pointer-events:auto;cursor:pointer;
    font-family:'Luckiest Guy';font-size:18px;letter-spacing:.02em;color:#1a0b2e;
    background:linear-gradient(180deg,#8bff5a,#3bd46a);border:none;border-radius:14px;padding:12px 26px;
    box-shadow:0 7px 0 #1f7a34, 0 10px 20px rgba(0,0,0,.4)}
  #playbtn:active{transform:translateX(-50%) translateY(3px);box-shadow:0 4px 0 #1f7a34}
  #loading{position:absolute;inset:0;display:grid;place-items:center;background:#05030d;z-index:20}
  #loading .l{font-family:'Creepster';font-size:34px;color:var(--slime);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.35}}
</style>
</head>
<body>
<div id="game">
  <canvas id="c"></canvas>
  <div id="tint"></div>
  <div id="vig"></div>
  <div id="flash"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="objective">Descend to the wreck</div>
    <div class="gauge">
      <div class="lab">Cylinder pressure</div>
      <div id="airval">200<small style="font-size:12px"> bar</small></div>
      <div class="bar"><i id="airbar"></i></div>
    </div>
    <div id="stats">
      <div><span id="depthpill">Depth 0 m</span></div>
      <div><span id="torchpill">Torch: primary</span></div>
      <div><span id="buddypill">Buddy: with you</span></div>
    </div>
    <div id="compass">
      <span class="card n">N</span><span class="card s">S</span><span class="card e">E</span><span class="card w">W</span>
      <div id="needle"><div class="red"></div><div class="wht"></div></div>
    </div>
  </div>

  <div id="narr"></div>

  <!-- touch controls -->
  <div id="pad">
    <button class="b-up" data-dir="up">▲</button>
    <button class="b-left" data-dir="left">◄</button>
    <button class="b-down" data-dir="down">▼</button>
    <button class="b-right" data-dir="right">►</button>
  </div>
  <div id="lookhint">Drag to look around &nbsp;•&nbsp; WASD / arrows to swim</div>

  <button id="exitbtn">✕ Exit game</button>
  <button id="playbtn"></button>

  <div id="screen"></div>
  <div id="loading"><div class="l">Loading the deep&hellip;</div></div>
  <div class="credit">An educational dive game &bull; Dive within your training</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================================
   THE SUNKEN PIRATE WRECK  —  an educational game about qualification.
   Scooby-Doo meets escape room. One self-contained file for github.io.
   ========================================================================= */
(function(){
"use strict";
if(!window.THREE){ document.getElementById('loading').innerHTML =
  '<div class="l" style="font-size:20px">Could not load 3D engine.<br>Check your internet and reload.</div>'; return; }

/* ---------- DOM ---------- */
const cvs   = document.getElementById('c');
const tint  = document.getElementById('tint');
const flash = document.getElementById('flash');
const hud   = document.getElementById('hud');
const objEl = document.getElementById('objective');
const narrEl= document.getElementById('narr');
const scr   = document.getElementById('screen');
const pad   = document.getElementById('pad');
const lookhint = document.getElementById('lookhint');
const airval= document.getElementById('airval');
const airbar= document.getElementById('airbar');
const depthpill=document.getElementById('depthpill');
const torchpill=document.getElementById('torchpill');
const buddypill=document.getElementById('buddypill');
const compassEl=document.getElementById('compass');
const needle=document.getElementById('needle');
const exitbtn=document.getElementById('exitbtn');
const playbtn=document.getElementById('playbtn');

/* ---------- three basics ---------- */
const renderer = new THREE.WebGLRenderer({canvas:cvs, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x03131f);
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.1, 800);
const clock  = new THREE.Clock();
function resize(){ renderer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
addEventListener('resize',resize); resize();

/* ---------- helpers ---------- */
const R = (a,b)=> a + Math.random()*(b-a);
function disposeObj(o){ o.traverse&&o.traverse(n=>{ if(n.geometry)n.geometry.dispose(); if(n.material){ (Array.isArray(n.material)?n.material:[n.material]).forEach(m=>m.dispose&&m.dispose()); } }); }
function clearScene(){ for(let i=scene.children.length-1;i>=0;i--){ const o=scene.children[i]; scene.remove(o); disposeObj(o);} scene.fog=null; }
function setTint(v){ tint.style.opacity=v; }
function doFlash(){ flash.style.transition='none'; flash.style.opacity='.9'; requestAnimationFrame(()=>{ flash.style.transition='opacity .6s'; flash.style.opacity='0'; }); }
function say(t){ narrEl.innerHTML=t; narrEl.classList.add('on'); }
function hush(){ narrEl.classList.remove('on'); }
function objective(t){ objEl.innerHTML=t; }
function showHUD(on){ hud.classList.toggle('on',!!on); exitbtn.style.display=on?'block':'none'; }
function showButton(label,act){ playbtn.innerHTML=label; playbtn.dataset.act=act; playbtn.style.display='block'; }
function hideButton(){ playbtn.style.display='none'; playbtn.dataset.act=''; }
exitbtn.addEventListener('click',()=>{ hideButton(); ACT.restart(); });
playbtn.addEventListener('click',()=>{ const a=playbtn.dataset.act; if(a&&ACT[a])ACT[a](); });

/* screen overlay builder */
function screen(html){ scr.innerHTML='<div class="panel">'+html+'</div>'; scr.classList.add('on'); }
function hideScreen(){ scr.classList.remove('on'); scr.innerHTML=''; }
scr.addEventListener('click',e=>{ const b=e.target.closest('[data-act]'); if(b) ACT[b.dataset.act] && ACT[b.dataset.act](b); });

/* ---------- materials ---------- */
const WOOD  = ()=> new THREE.MeshStandardMaterial({color:0x3b2a1b, roughness:.95});
const WOOD2 = ()=> new THREE.MeshStandardMaterial({color:0x2a1d12, roughness:1});
const CORAL = c => new THREE.MeshStandardMaterial({color:c, roughness:.6, emissive:new THREE.Color(c).multiplyScalar(.12)});

/* ---------- builders ---------- */
function makeWreck(){
  const g=new THREE.Group();
  // hull
  const hull=new THREE.Mesh(new THREE.BoxGeometry(34,10,11), WOOD());
  hull.scale.set(1,1,1); g.add(hull);
  const bow=new THREE.Mesh(new THREE.ConeGeometry(5.5,12,4), WOOD());
  bow.rotation.z=-Math.PI/2; bow.rotation.y=Math.PI/4; bow.position.x=22; bow.scale.z=.42; g.add(bow);
  const deck=new THREE.Mesh(new THREE.BoxGeometry(30,1,9), WOOD2()); deck.position.y=5.2; g.add(deck);
  // rear castle
  const cabin=new THREE.Mesh(new THREE.BoxGeometry(8,6,9), WOOD()); cabin.position.set(-12,7,0); g.add(cabin);
  // masts (broken)
  const m1=new THREE.Mesh(new THREE.CylinderGeometry(.6,.8,20,8), WOOD2()); m1.position.set(4,12,0); m1.rotation.z=.5; g.add(m1);
  const m2=new THREE.Mesh(new THREE.CylinderGeometry(.5,.7,9,8), WOOD2()); m2.position.set(-6,9,0); m2.rotation.z=-.25; g.add(m2);
  const yard=new THREE.Mesh(new THREE.CylinderGeometry(.35,.35,16,6), WOOD2()); yard.rotation.x=Math.PI/2; yard.position.set(4,15,0); yard.rotation.z=.5; g.add(yard);
  // tattered sail
  const sailMat=new THREE.MeshStandardMaterial({color:0x6b6152,roughness:1,transparent:true,opacity:.55,side:THREE.DoubleSide});
  const sail=new THREE.Mesh(new THREE.PlaneGeometry(12,8), sailMat); sail.position.set(4,12,.2); sail.rotation.z=.5; g.add(sail);
  // cannons
  for(let i=0;i<4;i++){ const c=new THREE.Mesh(new THREE.CylinderGeometry(.5,.6,4,10), new THREE.MeshStandardMaterial({color:0x1c1c22,roughness:.5,metalness:.6})); c.rotation.z=Math.PI/2; c.position.set(-8+i*7, 3.5, (i%2?1:-1)*6); g.add(c);}
  // ship wheel
  const wheel=new THREE.Group(); const ring=new THREE.Mesh(new THREE.TorusGeometry(1.6,.22,8,20), WOOD2()); wheel.add(ring);
  for(let i=0;i<6;i++){ const s=new THREE.Mesh(new THREE.CylinderGeometry(.1,.1,3.6,6), WOOD2()); s.rotation.z=i*Math.PI/6; wheel.add(s);}
  wheel.position.set(-12,9,-3); wheel.rotation.x=.4; g.add(wheel);
  // treasure chest (glint)
  const chest=new THREE.Mesh(new THREE.BoxGeometry(3,2,2), new THREE.MeshStandardMaterial({color:0x5a3a18,roughness:.7}));
  chest.position.set(10,0.5,3); chest.rotation.y=.6; g.add(chest);
  const gold=new THREE.Mesh(new THREE.SphereGeometry(1.1,10,10), new THREE.MeshStandardMaterial({color:0xffd76b,emissive:0x5a4300,roughness:.3,metalness:.7}));
  gold.position.set(10,1.6,3); gold.scale.y=.4; g.add(gold);
  // coral + barnacles
  const cols=[0xff5e8a,0xff9f43,0x7b5bff,0x2ec7ff,0x5aff9d];
  for(let i=0;i<40;i++){ const c=cols[i%cols.length];
    const cor=new THREE.Mesh(new THREE.ConeGeometry(R(.4,1.1),R(1,3),6), CORAL(c));
    cor.position.set(R(-17,17), R(-1,6), (Math.random()<.5?-1:1)*R(4.5,6)); cor.rotation.set(R(-.4,.4),0,R(-.4,.4)); g.add(cor);
  }
  // dark entrance hatch on the +Z hull side — the way IN
  const frame=new THREE.Mesh(new THREE.BoxGeometry(5.2,5.6,1.4), WOOD2()); frame.position.set(2,2.4,5.5); g.add(frame);
  const hole =new THREE.Mesh(new THREE.BoxGeometry(3.6,4,2.4), new THREE.MeshBasicMaterial({color:0x000000})); hole.position.set(2,2.4,5.9); g.add(hole);
  g.userData.entranceLocal=new THREE.Vector3(2,2.4,8); // approach point just outside the hatch
  g.rotation.z=-0.13; // listing on the seabed
  g.position.y=-2;
  return g;
}
function seabed(){
  const g=new THREE.Group();
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(400,400,1,1), new THREE.MeshStandardMaterial({color:0x223d2f,roughness:1}));
  floor.rotation.x=-Math.PI/2; floor.position.y=-8; g.add(floor);
  for(let i=0;i<60;i++){ const r=new THREE.Mesh(new THREE.DodecahedronGeometry(R(.6,2.5)), new THREE.MeshStandardMaterial({color:0x2a3b30,roughness:1}));
    r.position.set(R(-120,120),-7.5,R(-120,120)); g.add(r);}
  return g;
}
function godRays(){
  const g=new THREE.Group();
  const mat=new THREE.MeshBasicMaterial({color:0x9fe8ff,transparent:true,opacity:.06,side:THREE.DoubleSide,depthWrite:false});
  for(let i=0;i<7;i++){ const r=new THREE.Mesh(new THREE.ConeGeometry(R(6,12),90,8,1,true), mat.clone());
    r.position.set(R(-60,60),45,R(-60,60)); r.rotation.z=R(-.15,.15); g.add(r);}
  return g;
}
function particles(n,spread,color,size,yBase){
  const geo=new THREE.BufferGeometry(); const pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){ pos[i*3]=R(-spread,spread); pos[i*3+1]=(yBase||0)+R(-spread,spread); pos[i*3+2]=R(-spread,spread);}
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({color:color,size:size,transparent:true,opacity:.5,depthWrite:false});
  return new THREE.Points(geo,mat);
}
// A realistic scuba diver in the natural PRONE (horizontal) trim: belly down,
// head forward (+Z). Outer group `g` is oriented by lookAt(); inner `rig`
// carries the body so panic-roll can be applied without breaking lookAt.
function makeDiver(suit,opts){
  opts=opts||{};
  const g=new THREE.Group();
  const rig=new THREE.Group(); g.add(rig);
  const wet   = new THREE.MeshStandardMaterial({color:suit, roughness:.55, metalness:.05});
  const black = new THREE.MeshStandardMaterial({color:0x14171d, roughness:.75});
  const glass = new THREE.MeshStandardMaterial({color:0x0b1a2a, metalness:.5, roughness:.12, emissive:0x081018});
  const tankM = new THREE.MeshStandardMaterial({color:0xd8b23a, metalness:.55, roughness:.35});

  // torso: tapered chest + hips, lying along Z
  const chest=new THREE.Mesh(new THREE.CylinderGeometry(.6,.68,1.7,16), wet); chest.rotation.x=Math.PI/2; chest.position.z=.55; rig.add(chest);
  const hips =new THREE.Mesh(new THREE.CylinderGeometry(.5,.4,1.2,16), wet); hips.rotation.x=Math.PI/2; hips.position.z=-.65; rig.add(hips);
  // hood + face + mask
  const hood=new THREE.Mesh(new THREE.SphereGeometry(.44,18,18), black); hood.position.set(0,.12,1.5); rig.add(hood);
  const face=new THREE.Mesh(new THREE.SphereGeometry(.33,16,16), wet); face.scale.set(1,1,.7); face.position.set(0,.02,1.74); rig.add(face);
  const mask=new THREE.Mesh(new THREE.BoxGeometry(.46,.22,.16), glass); mask.position.set(0,.06,1.9); rig.add(mask);

/* =====================================================================
   PHASE: MAZE — the ship's hold. Find torch, air drains, compass spins,
   collide → drop torch → no backup → lost.
   ===================================================================== */
const MAZE=[
 "#############",
 "#S    #     #",
 "# ### # ### #",
 "# #   #   # #",
 "# # ##### # #",
 "# #     # # #",
 "# ##### # # #",
 "#     #   # #",
 "##### ##### #",
 "#   #   T # #",
 "# # ### ### #",
 "# #       # E",
 "#############",
];
const CELL=9, WALL_H=14;
let air=200, hasTorch=false, torchLight=null, compassSpin=false, mazeDone=false;
let px=0,pz=0; // player world pos

function cellAt(wx,wz){ const c=Math.floor(wx/CELL), r=Math.floor(wz/CELL); return {r,c}; }
function isWall(r,c){ if(r<0||c<0||r>=MAZE.length||c>=MAZE[0].length)return true; return MAZE[r][c]==='#'; }

function phaseMaze(){
  setPhase({}); showHUD(true); pad.classList.add('on'); lookhint.classList.add('on'); lookEnabled=true;
  hasTorch=false; compassSpin=false; mazeDone=false; torchLight=null;
  objective('Find a torch &mdash; you cannot see!'); torchState('lost in the silt'); buddyState('separated');
  setTint(0);
  scene.fog=new THREE.FogExp2(0x050a12,0.05);
  scene.add(new THREE.AmbientLight(0x2a3a52,.4));
  // build maze geometry
  const wallMat=new THREE.MeshStandardMaterial({color:0x241a12,roughness:1});
  const beamMat=new THREE.MeshStandardMaterial({color:0x0f0a06,roughness:1});
  let start={r:1,c:1}, torchCell={r:9,c:9}, exit={r:11,c:12};
  for(let r=0;r<MAZE.length;r++)for(let c=0;c<MAZE[r].length;c++){ const ch=MAZE[r][c];
    if(ch==='#'){ const w=new THREE.Mesh(new THREE.BoxGeometry(CELL,WALL_H,CELL), Math.random()<.5?wallMat:beamMat);
      w.position.set(c*CELL+CELL/2, WALL_H/2-2, r*CELL+CELL/2); scene.add(w); }
    if(ch==='S')start={r,c}; if(ch==='T')torchCell={r,c}; if(ch==='E')exit={r,c};
  }
  // floor + ceiling
  const w=MAZE[0].length*CELL, d=MAZE.length*CELL;
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(w,d), new THREE.MeshStandardMaterial({color:0x120c07,roughness:1}));
  floor.rotation.x=-Math.PI/2; floor.position.set(w/2,-2,d/2); scene.add(floor);
  const ceil=floor.clone(); ceil.position.y=WALL_H-2; ceil.rotation.x=Math.PI/2; scene.add(ceil);
  // torch pickup (glowing)
  const torchPickup=new THREE.Group();
  const tb=new THREE.Mesh(new THREE.CylinderGeometry(.4,.5,3,10), new THREE.MeshStandardMaterial({color:0x222,metalness:.6,roughness:.3}));
  const th=new THREE.Mesh(new THREE.SphereGeometry(.7,12,12), new THREE.MeshStandardMaterial({color:0xffe08a,emissive:0xffb23a,emissiveIntensity:2}));
  th.position.y=1.8; torchPickup.add(tb,th);
  const glow=new THREE.PointLight(0xffc46a,2.2,20); glow.position.y=2; torchPickup.add(glow);
  torchPickup.position.set(torchCell.c*CELL+CELL/2, 0, torchCell.r*CELL+CELL/2); scene.add(torchPickup);
  // floating debris/silt inside
  const dust=particles(500,Math.max(w,d)/2,0x6b5533,.5,WALL_H/2); dust.position.set(w/2,0,d/2); scene.add(dust);
  // headlamp (very weak until torch found)
  torchLight=new THREE.SpotLight(0xffd9a0,0.0,55,.6,.5,1); camera.add(torchLight);
  const tt=new THREE.Object3D(); tt.position.set(0,0,-10); camera.add(tt); torchLight.target=tt; scene.add(camera);
  const faint=new THREE.PointLight(0x6f93b8,.95,22); camera.add(faint);

  // place player
  px=start.c*CELL+CELL/2; pz=start.r*CELL+CELL/2; camera.position.set(px,3,pz); look.yaw=Math.PI/2; look.pitch=0;
  let t=0, torchGrabbedAt=-1, warned=false, collisions=0, exitHintAt=-1;
  say("Blind. Panicking. Your primary torch slipped from your hand in the cloud. Find it &mdash; every breath is burning air.");

  phase.update=(dt)=>{ if(mazeDone)return; t+=dt;
    // air drains fast; faster while moving/panicking
    const moving = keys.KeyW||keys.KeyS||keys.KeyA||keys.KeyD||keys.ArrowUp||keys.ArrowDown||keys.ArrowLeft||keys.ArrowRight||touch.up||touch.down||touch.left||touch.right;
    air-=dt*(moving?5.5:3.2); if(air<=0){ air=0; updateAir(); mazeDone=true; say("Out of air."); setTimeout(()=>phaseLost('air'),900); return; }
    updateAir();
    // look
    camera.rotation.order='YXZ'; camera.rotation.y=look.yaw; camera.rotation.x=look.pitch;
    // move (forward relative to yaw, on XZ plane)
    let fwd=0,str=0;
    if(keys.KeyW||keys.ArrowUp||touch.up)fwd+=1; if(keys.KeyS||keys.ArrowDown||touch.down)fwd-=1;
    if(keys.KeyA||keys.ArrowLeft||touch.left)str-=1; if(keys.KeyD||keys.ArrowRight||touch.right)str+=1;
    const spd=12*dt; const sinY=Math.sin(look.yaw), cosY=Math.cos(look.yaw);
    // forward is -Z when yaw considered; derive dx,dz
    let dx=(fwd*(-sinY)+str*(cosY))*spd;
    let dz=(fwd*(-cosY)+str*(-sinY))*spd;
    const nx=px+dx, nz=pz+dz; const rad=2.2;
    let hit=false;
    // simple grid collision: test the target cell corners
    if(!blocked(nx,pz,rad)){ px=nx; } else { hit=true; }
    if(!blocked(px,nz,rad)){ pz=nz; } else { hit=true; }
    camera.position.set(px,3,pz);
    // bob
    camera.position.y=3+Math.sin(t*4)*.12;
    // torch pickup
    torchPickup.rotation.y+=dt*1.2; th.position.y=1.8+Math.sin(t*3)*.2;
    if(!hasTorch){ const d=Math.hypot(px-torchPickup.position.x, pz-torchPickup.position.z);
      if(d<4){ hasTorch=true; torchGrabbedAt=t; scene.remove(torchPickup); torchLight.intensity=2.6; faint.intensity=.2;
        torchState('primary (found!)'); objective('Find the exit &mdash; check your compass'); compassEl.style.display='grid'; compassSpin=true;
        say("You find the torch! But the wreck is a maze of iron. You look at your compass &mdash; the needle spins wildly. Magnetic metal everywhere. It is useless."); }
    }
    // after torch, first real collision drops it
    if(hasTorch && hit){ collisions++; if(collisions>=2 && !mazeDone){ mazeDone=true; dropTorchPrompt(); return; } }
    if(hasTorch && !warned && t-torchGrabbedAt>2){ warned=true; say("Which way did you come in? Left? Right? Every corridor looks the same in the torch beam."); }
    // compass spin
    if(compassSpin){ needle.style.transform='rotate('+(t*720%360)+'deg)'; }
    // dust drift
    const pa=dust.geometry.attributes.position; for(let i=0;i<pa.count;i++){ pa.setX(i,pa.getX(i)+Math.sin(t+i)*dt*.2);} pa.needsUpdate=true;
  };
  phase.cleanup=()=>{ pad.classList.remove('on'); lookhint.classList.remove('on'); lookEnabled=false; compassEl.style.display='none'; compassSpin=false; };
}
function blocked(wx,wz,rad){
  // check the cell of several sample points around the player radius
  const pts=[[wx+rad,wz],[wx-rad,wz],[wx,wz+rad],[wx,wz-rad]];
  for(const [x,z] of pts){ const {r,c}=cellAt(x,z); if(isWall(r,c))return true; }
  return false;
}
function dropTorchPrompt(){
  torchState('DROPPED!'); if(torchLight)torchLight.intensity=0;
  doFlash(); scene.fog.density=0.11;
  say("CLANG! You slam into an iron beam in the dark. The torch spins away into the black&hellip;");
  setTimeout(()=>{
    screen(`
      <div class="lose">
        <div class="kicker">Total darkness</div>
        <h2 class="big" style="color:#ffcf5a">Your torch is gone.</h2>
        <p class="sub">You hit a beam and dropped your only light. Do you have a backup torch?</p>
        <div class="cards">
          <div class="card-btn bad" data-act="noBackup">
            <div class="ico">🔦❌</div>
            <h3>Check your pockets&hellip;</h3>
            <p>You never carried a backup. Wreck divers always carry two lights. You have none.</p>
            <span class="tag warn">No backup torch</span>
          </div>
        </div>
      </div>
    `);
  },1400);
}

/* =====================================================================
   PHASE: LOST — buddy struggling, certified divers calm above
   ===================================================================== */
function phaseLost(reason){
  setPhase({}); showHUD(true); objective('Lost inside the wreck'); torchState('primary'); buddyState('separated');
  air=48; updateAir();
  // Dark water, but a faint fill so the audience can still SEE the drama.
  scene.add(new THREE.HemisphereLight(0x16283d,0x01040a,.55));
  const fill=new THREE.PointLight(0x2f6a9c,.6,70); fill.position.set(0,12,26); scene.add(fill);
  const moon=new THREE.PointLight(0x9fd8ff,.45,150); moon.position.set(0,70,0); scene.add(moon);
  scene.fog=new THREE.FogExp2(0x03080f,0.02);
  scene.add(seabed());
  const wreck=makeWreck(); wreck.position.set(0,-4,-6); scene.add(wreck);
  // the silt cloud that split them apart
  const silt=particles(320,11,0x6b5533,.32,2); silt.position.set(0,1,9); silt.material.opacity=.4; scene.add(silt);

  const me   =makeDiver(0xffca3a,{light:true});      scene.add(me);   // still has a torch
  const buddy=makeDiver(0x22c1ff);                   scene.add(buddy);// no light, groping
  // certified pair, calm, above, torches + guideline
  const cd1=makeDiver(0x8bff5a,{light:true,lightIntensity:2.6}); cd1.position.set(-4,15,-2); scene.add(cd1);
  const cd2=makeDiver(0x37e0c8,{light:true,lightIntensity:2.6}); cd2.position.set(4,16,-5); scene.add(cd2);
  const lg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-4,15,-2),new THREE.Vector3(4,16,-5),new THREE.Vector3(34,22,24)]);
  scene.add(new THREE.Line(lg,new THREE.LineBasicMaterial({color:0xffd23f})));

  let t=0, broke=false, beat=-1;
  const beats=[
    [0.2,"In the silt cloud you lost each other &ndash; one drifts left, one right. No guideline to follow back."],
    [3.2,"One of you still has a torch, sweeping the dark for a way out of the wreck."],
    [6.0,"He swims blind into an iron beam &ndash; CLANG. The torch shatters. There is no backup light."],
    [9.2,"His air is running low now, and the black is total. Both of you are lost and alone."],
    [12.5,"Far above, two <b>Wreck Diver</b> divers hover calm &ndash; guideline laid, a torch each. They trained for exactly this."],
  ];
  camera.position.set(0,9,32);
  phase.update=(dt)=>{ t+=dt;
    if(beat+1<beats.length && t>=beats[beat+1][0]){ beat++; say(beats[beat][1]); }
    camera.position.set(Math.sin(t*.14)*7, 9+Math.sin(t*.3)*1, 32-Math.min(8,t)); camera.lookAt(0,6.5,0);
    silt.material.opacity=Math.max(0,.55-t*.07);

    if(t<6){
      // A) diver1 searches with torch (sweeping); diver2 drifts away, groping
      me.position.set(-3+Math.sin(t*.5)*2, 2+Math.sin(t*1.2)*.4, 5+t*1.1);
      me.rotation.set(0, Math.PI + Math.sin(t*.6)*.7, 0);
      if(me.userData.hand) me.userData.hand.rotation.y=Math.sin(t*1.7)*.5;
      finKick(me,t*2);
      buddy.position.set(4+Math.sin(t*.4)*1.5, 1+Math.cos(t)*.5, 8-t*.6);
      buddy.rotation.set(0, .6+Math.sin(t*.5)*.5, 0);
      thrash(buddy,t*1.6);
    } else {
      if(!broke){ broke=true; doFlash(); breakTorch(me); torchState('broken &ndash; no spare'); buddyState('lost'); objective('Air running low'); }
      const p=t-6;
      me.position.set(-2+Math.sin(p*2)*.7, 2+Math.sin(p*1.5)*.5, 11);
      thrash(me,p*3);
      buddy.position.set(4+Math.sin(p*1.3)*.9, 1+Math.cos(p*1.7)*.5, 4);
      thrash(buddy,p*3.2);
      air=Math.max(3,48-p*7); updateAir();               // gas draining before your eyes
    }
    // certified pair: calm hover, steady torches
    cd1.position.y=15+Math.sin(t*.8)*.35; cd2.position.y=16+Math.cos(t*.7)*.35;
    cd1.rotation.y=Math.PI+Math.sin(t*.3)*.2; cd2.rotation.y=Math.PI+Math.cos(t*.25)*.2;
    finKick(cd1,t*.6); finKick(cd2,t*.7);

    if(t>15.5){ hush(); lostEnd(); }
  };
}
function lostEnd(){
  objective('Dive failed');
  screen(`
    <div class="lose">
      <div class="kicker">Rule of thirds ignored &bull; no guideline &bull; no backup light</div>
      <h2 class="big">DIVE UNSUCCESSFUL</h2>
      <p class="sub">You went into an overhead environment without the training or the gear. The silt, the maze, the spinning compass, the dropped torch &mdash; every one is a hazard the <b>Wreck Diver</b> course teaches you to handle.</p>
      <div class="lesson">The two divers above weren&rsquo;t braver than you. They were <b>qualified</b>: guideline reel, primary + backup torch, gas planning, lost-buddy and lost-line drills. <b>Being qualified for what you do</b> is the whole difference between a nightmare and a beautiful dive.</div>
      <button class="btn" data-act="retry">Repeat the dive ▶</button>
      <button class="btn ghost" data-act="pickWreck">Try it trained &amp; equipped</button>
    </div>
  `);
}

/* =====================================================================
   PHASE: CERTIFIED — the trained way in (good ending for Entry 2)
   ===================================================================== */
function phaseCertified(){
  setPhase({}); showHUD(true); objective('The trained way in &ndash; drag to look'); air=200; updateAir(); torchState('primary + backup'); buddyState('on the line');
  compassEl.style.display='none';
  seaLights(); scene.add(seabed()); scene.add(godRays()); scene.fog=new THREE.FogExp2(0x0c4a6b,0.01);
  const wreck=makeWreck(); wreck.position.set(0,0,0); scene.add(wreck); wreck.updateMatrixWorld();
  const ent=wreck.localToWorld(wreck.userData.entranceLocal.clone());   // world entry point
  const bub=particles(200,70,0xbfefff,.32,0); scene.add(bub);
  // divers deliberately SMALL so the wreck towers over them
  const me   =makeDiver(0x8bff5a,{light:true}); me.scale.setScalar(.55);   scene.add(me);
  const buddy=makeDiver(0x37e0c8,{light:true}); buddy.scale.setScalar(.55); scene.add(buddy);
  // guideline reel: tie-off out in open water -> just outside -> hatch -> just inside
  const tie  =ent.clone().add(new THREE.Vector3(16,2,18));
  const outPt=ent.clone().add(new THREE.Vector3(0,0,5));
  const inPt =ent.clone().add(new THREE.Vector3(0,0,-4.5));
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([tie,outPt,ent,inPt]), new THREE.LineBasicMaterial({color:0xffd23f})));
  // free-look orbit around the entrance
  orbit.on=true; orbit.target.copy(ent).add(new THREE.Vector3(-1,2,1)); orbit.yaw=0.6; orbit.pitch=0.3; orbit.rad=46;
  lookhint.textContent='Drag to look around  •  scroll to zoom'; lookhint.classList.add('on');
  const path=(u)=> u<.4 ? tie.clone().lerp(outPt,u/.4)
                 : u<.7 ? outPt.clone().lerp(ent,(u-.4)/.3)
                 :        ent.clone().lerp(inPt,(u-.7)/.3);
  const beats=[
    [0.2,"The wreck towers over the divers. Drag to look around, scroll to zoom."],
    [2.5,"They tie off a <b>guideline reel</b> in open water &ndash; a golden thread straight back out."],
    [5.5,"Primary torch on, backup on the harness. They line up single file at the hatch."],
    [8.5,"Slowly &ndash; no fin-down, no silt &ndash; they follow the line <b>into</b> the wreck."],
  ];
  let t=0, beat=-1, finished=false; const dur=10;
  say(beats[0][1]);
  phase.update=(dt)=>{ t+=dt; depthReadout(20); if(air>150){ air=Math.max(150,200-t*2); updateAir(); }
    if(beat+1<beats.length && t>=beats[beat+1][0]){ beat++; say(beats[beat][1]); }
    const um=Math.min(1,t/dur), ub=Math.min(1,Math.max(0,t-1.8)/dur);
    const pm=path(um); me.position.copy(pm); me.lookAt(path(Math.min(1,um+0.02))); finKick(me,t*1.4);
    const pb=path(ub); buddy.position.copy(pb); buddy.lookAt(path(Math.min(1,ub+0.02))); finKick(buddy,t*1.5);
    riseBubbles(bub,dt); applyOrbit();
    if(t>12 && !finished){ finished=true; showButton('They made it in safely &ndash; Finish ▶','finishCert'); }
  };
  phase.cleanup=()=>{ orbit.on=false; lookhint.classList.remove('on'); hideButton(); };
}
function certEnd(){
  objective('Dive complete');
  screen(`
    <div class="win">
      <div class="kicker">Guideline reeled in &bull; both lights working &bull; gas to spare</div>
      <h2 class="big">SUCCESS!</h2>
      <p class="sub">You penetrated the wreck and came home safe &mdash; because you were <b>trained and equipped</b> for it. The same doorway that trapped the untrained diver was, for you, the best dive of the trip.</p>
      <div class="lesson">That is the lesson of the whole game: <b>be qualified for what you do.</b> Same wreck, same dark, same maze &mdash; training and the right gear are what turn danger into wonder. Earn the ticket, then enjoy the ride.</div>
      <button class="btn" data-act="restart">Play again ▶</button>
    </div>
  `);
}

/* =====================================================================
   SHARED HUD + ANIM UTILITIES
   ===================================================================== */
function updateAir(){ const v=Math.max(0,Math.round(air)); airval.innerHTML=v+'<small style="font-size:12px"> bar</small>';
  const pct=Math.max(0,Math.min(100,air/200*100)); airbar.style.width=pct+'%';
  airbar.style.background = pct>50?'linear-gradient(90deg,#3bff9d,#c7ff3b)': pct>25?'linear-gradient(90deg,#ffd23f,#ff9f1c)':'linear-gradient(90deg,#ff6b6b,#ff3b6b)';
}
function torchState(s){ torchpill.textContent='Torch: '+s; }
function buddyState(s){ buddypill.textContent='Buddy: '+s; }
function depthReadout(m){ depthpill.textContent='Depth '+Math.round(m)+' m'; }
function finKick(d,t){ if(!d.userData)return; const k=Math.sin(t*4); const u=d.userData;
  if(u.fin1)u.fin1.rotation.x=k*.5; if(u.fin2)u.fin2.rotation.x=-k*.5;
  if(u.legL)u.legL.rotation.x=Math.PI/2+k*.12; if(u.legR)u.legR.rotation.x=Math.PI/2-k*.12; }
function thrash(d,t){ if(!d.userData)return; const u=d.userData; const rig=u.rig||d;
  if(u.arm1)u.arm1.rotation.set(Math.PI/2, Math.sin(t)*1.0, .3+Math.sin(t*1.3)*.6);
  if(u.arm2)u.arm2.rotation.set(Math.PI/2, -Math.sin(t*1.1)*1.0, -.3-Math.cos(t*1.2)*.6);
  if(u.fin1)u.fin1.rotation.x=Math.sin(t*3)*.9; if(u.fin2)u.fin2.rotation.x=-Math.sin(t*3.2)*.9;
  rig.rotation.z=Math.sin(t*.8)*.4; rig.rotation.x=Math.sin(t*.6)*.2; }
function animFish(g,dt){ const t=performance.now()*0.001; g.userData.list.forEach(f=>{ f.a+=dt*f.sp; f.m.position.set(Math.cos(f.a)*f.rad, f.yo+Math.sin(t+f.ph)*1.5, Math.sin(f.a)*f.rad); f.m.rotation.y=-f.a+Math.PI/2; }); }
function riseBubbles(b,dt){ const pa=b.geometry.attributes.position; for(let i=0;i<pa.count;i++){ let y=pa.getY(i)+dt*4; if(y>70)y=-20; pa.setY(i,y);} pa.needsUpdate=true; }

/* ---------- go ---------- */
document.getElementById('loading').style.display='none';
phaseTitle();
animate();
})();
