<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScubaDiverse Games</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(#dff6ff, #087b93);
      color: #102030;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    main {
      width: min(680px, 100%);
      background: white;
      border: 4px solid #102030;
      border-radius: 18px;
      box-shadow: 8px 8px 0 #102030;
      padding: 24px;
      text-align: center;
    }
    h1 { margin-top: 0; }
    .games {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }
    a.game-link {
      display: block;
      border: 3px solid #102030;
      border-radius: 14px;
      padding: 16px;
      color: #102030;
      text-decoration: none;
      font-weight: 900;
      background: #f6fbff;
      box-shadow: 4px 4px 0 #102030;
    }
    a.game-link:hover { transform: translate(-1px, -1px); }
    p { line-height: 1.45; }
  </style>
</head>
<body>
  <main>
    <h1>ScubaDiverse Games</h1>
    <p>Choose a marine-life game.</p>
    <div class="games">
      <a class="game-link" href="/">🐠 Fish ID Game</a>
      <a class="game-link" href="/games/turtle-spotter/">📷 Turtle Spotter 🐢</a>
    </div>
  </main>
</body>
</html>
