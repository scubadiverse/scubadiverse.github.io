<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Turtle Snap &ndash; Free Diving Photo Game | DiveScanner</title>
<meta name="description" content="Turtle Snap, a free diving game by DiveScanner. Tap the turtles as they swim by to photograph as many as you can - but avoid the other animals. Plays on mobile and desktop." />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="https://divescanner.net/games/turtle-snap/" />
<meta property="og:title" content="Turtle Snap &ndash; Free Diving Photo Game | DiveScanner" />
<meta property="og:description" content="Tap the turtles as they swim by and photograph as many as you can. A free diving mini-game." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://divescanner.net/games/turtle-snap/" />
<meta property="og:image" content="https://divescanner.net/assets/img/og-image.png" />
<link rel="icon" href="/assets/img/favicon.svg?v=original-mask" type="image/svg+xml" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png?v=original-mask" />
<link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png?v=original-mask" />
<meta name="theme-color" content="#42f5e6" />
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:#eef4fb;font-family:Arial,Helvetica,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100svh;padding:8px}
  .ts{position:relative;width:100%;max-width:820px;border:3px solid #0d3d6b;border-radius:14px;overflow:hidden;box-shadow:0 8px 24px rgba(13,61,107,.28);cursor:none;user-select:none;-webkit-user-select:none;touch-action:manipulation}
  .ts canvas{display:block;width:100%;height:auto;background:linear-gradient(#bfeeff,#5fc7ee 62%,#2f9fd0)}
  .ts .bar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:7px 11px;color:#fff;font-weight:800;font-size:13px;background:linear-gradient(rgba(13,61,107,.8),rgba(13,61,107,0));z-index:2}
  .ts .bar .s{color:#42f5e6}
  .ts .bar .lives{letter-spacing:1px}
  .ts .help{position:absolute;left:0;right:0;bottom:0;padding:7px 11px;text-align:center;font-size:12.5px;font-weight:700;color:#e7fff9;background:linear-gradient(rgba(13,61,107,0),rgba(13,61,107,.82));z-index:2}
  .ts .help b{color:#42f5e6}
  .ts .msg{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;color:#fff;background:rgba(13,61,107,.5);font-weight:800;gap:6px;padding:12px;z-index:3;cursor:pointer}
  .ts .msg small{font-weight:600;font-size:12.5px;opacity:.95}
  .ts .msg.hide{display:none}
</style>
</head>
<body>
  <div class="ts" id="ts">
    <canvas id="c" width="700" height="240"></canvas>
    <div class="bar"><span>📸 Turtle Snap &middot; <span class="s" id="level">Lv 1</span></span><span><span class="s" id="score">🐢 0</span> &middot; <span class="lives" id="lives">❤❤❤❤❤</span></span></div>
    <div class="help" id="help">📸 <b>Tap the turtles</b> 🐢 to photograph them &middot; don't tap the other animals!</div>
    <div class="msg hide" id="msg"><div id="mt">📸 Turtle Snap</div><small id="ms">Tap the turtles as they swim by &middot; 5 wrong taps and it's over</small></div>
  </div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
const scoreEl=document.getElementById('score'),levelEl=document.getElementById('level'),livesEl=document.getElementById('lives');
const msg=document.getElementById('msg'),mt=document.getElementById('mt'),ms=document.getElementById('ms');
const EMO=(s)=>s+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
const DISTRACT=['🐡','🦈','🐠','🦀','🐙','🐚','🐟'];
const TURTLE_RINGS=['#0a7f8f','#2e7d32','#b8860b','#305f72','#8e44ad','#c0392b']; // varied "shell" colours
const MAX_STRIKES=5;
let obs=[],bubbles=[],score=0,strikes=0,level=1,spawn=0,lastT=0,demo=false,running=false,best=0;
let ptr={x:W/2,y:H/2,on:false,pulse:0},flash=null;
for(let i=0;i<22;i++)bubbles.push({x:Math.random()*W,y:Math.random()*H,r:1+Math.random()*3,s:8+Math.random()*22});

// Difficulty builds GENTLY for the first ~3 levels, then ramps up sharply so every
// level after the 4th is a real challenge. `hard` only kicks in past level 4.
function hardness(){ return Math.max(0,score-12); }           // 0 until level 5 (score 16)
function diff(){ return 1+score*0.018+hardness()*0.05; }
function turtleSize(){ return Math.max(18,38-score*0.4-hardness()*0.6)+Math.random()*14; } // varied + shrinking
function turtleChance(){ return Math.max(0.30,0.55-score*0.008-hardness()*0.02); }         // more obstacles later
function spawnGap(){ return Math.max(0.26,0.62-score*0.006-hardness()*0.012); }             // more crowded later

function setBar(){ scoreEl.textContent='🐢 '+score; levelEl.textContent='Lv '+level; livesEl.textContent='❤'.repeat(Math.max(0,MAX_STRIKES-strikes)); }
function reset(isDemo){
  obs=[];score=0;strikes=0;level=1;spawn=0.3;flash=null;demo=!!isDemo;running=true;lastT=performance.now();
  setBar();msg.classList.add('hide');requestAnimationFrame(loop);
}
function spawnOne(){
  const isT=Math.random()<turtleChance();
  if(isT){ obs.push({emoji:'🐢',turtle:true,x:W+40,y:34+Math.random()*(H-76),size:turtleSize(),
    speed:(74+Math.random()*46)*diff(),wob:Math.random()*6.28,caught:false,snapT:0,ring:TURTLE_RINGS[Math.floor(Math.random()*TURTLE_RINGS.length)]}); }
  else { obs.push({emoji:DISTRACT[Math.floor(Math.random()*DISTRACT.length)],turtle:false,x:W+40,y:34+Math.random()*(H-76),
    size:30+Math.random()*14,speed:(74+Math.random()*46)*diff(),wob:Math.random()*6.28,caught:false}); }
}
function gameOver(){
  running=false; best=Math.max(best,score);
  mt.textContent='📸 '+score+' turtles photographed';
  ms.innerHTML='5 wrong taps &ndash; game over. Tap to play again &middot; best '+best;
  msg.classList.remove('hide');
}
function snapAt(x,y){
  if(!running){ reset(demo); return; }
  ptr.x=x;ptr.y=y;ptr.on=true;ptr.pulse=.25;
  let hitO=null,bd=1e9;
  for(const o of obs){ if(o.caught)continue; const d=Math.hypot(o.x-x,o.y-y); if(d<o.size*0.7&&d<bd){bd=d;hitO=o;} }
  if(!hitO){ flash={t:.25,txt:'',ok:false}; return; }          // tapping empty water is harmless
  if(hitO.turtle){ hitO.caught=true; score++; level=Math.floor(score/4)+1; flash={t:.35,txt:'📸 +1',ok:true}; setBar(); }
  else { strikes++; setBar(); flash={t:.4,txt:'✖ wrong! '+strikes+'/'+MAX_STRIKES,ok:false}; if(strikes>=MAX_STRIKES) gameOver(); }
}
function loop(now){
  if(!running) return;
  const dt=Math.min(.035,(now-lastT)/1000);lastT=now;
  spawn-=dt; if(spawn<=0){ spawnOne(); if(hardness()>0&&Math.random()<0.4)spawnOne(); spawn=spawnGap()+Math.random()*0.28; }
  obs.forEach(o=>{ o.x-=o.speed*dt; o.wob+=dt*3; o.y+=Math.sin(o.wob)*0.4; if(o.caught)o.snapT+=dt; });
  obs=obs.filter(o=>o.x>-50 && !(o.caught&&o.snapT>1));
  if(demo){ const t=obs.filter(o=>o.turtle&&!o.caught&&o.x<W-30).sort((a,b)=>a.x-b.x)[0];
    if(t){ ptr.x+=(t.x-ptr.x)*Math.min(1,dt*7); ptr.y+=(t.y-ptr.y)*Math.min(1,dt*7);
      if(Math.hypot(t.x-ptr.x,t.y-ptr.y)<18)snapAt(t.x,t.y); } ptr.on=true; }
  ptr.pulse=Math.max(0,ptr.pulse-dt); if(flash)flash.t-=dt; if(flash&&flash.t<=0)flash=null;
  draw();
  requestAnimationFrame(loop);
}
function draw(){
  ctx.clearRect(0,0,W,H);
  bubbles.forEach(b=>{ b.y-=b.s*.016; if(b.y<-4){b.y=H+4;b.x=Math.random()*W;} ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.2;ctx.stroke(); });
  ctx.font=EMO(20); const sc=(performance.now()*0.03)%44; for(let x=-20;x<W+30;x+=44)ctx.fillText('🪸',x-sc,H-5);
  ctx.textAlign='center';ctx.textBaseline='middle';
  obs.forEach(o=>{ ctx.save();ctx.translate(o.x,o.y);
    if(o.turtle){ ctx.beginPath();ctx.arc(0,0,o.size*0.62,0,7);ctx.strokeStyle=o.caught?'#2ecc71':o.ring;ctx.lineWidth=3.5;ctx.stroke(); }
    ctx.font=EMO(o.size);ctx.globalAlpha=o.caught?0.55:1;ctx.fillText(o.emoji,0,1);ctx.restore(); });
  if(ptr.on){ ctx.save();ctx.translate(ptr.x,ptr.y);
    if(ptr.pulse>0){ ctx.strokeStyle='rgba(66,245,230,.85)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,14+ptr.pulse*44,0,7);ctx.stroke(); }
    ctx.font=EMO(32);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('📸',0,0);ctx.restore(); }
  if(flash){ ctx.globalAlpha=Math.min(1,flash.t*3);ctx.font='bold 22px Arial';ctx.fillStyle=flash.ok?'#0a7f8f':'#a63737';ctx.textAlign='center';ctx.fillText(flash.txt,W/2,36);ctx.globalAlpha=1; }
}
const ts=document.getElementById('ts');
function pt(e){const r=cv.getBoundingClientRect();return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};}
ts.addEventListener('pointerdown',e=>{e.preventDefault();const p=pt(e);
  if(demo){ reset(false); return; }   // first tap takes over from the auto-demo
  snapAt(p.x,p.y);});
ts.addEventListener('pointermove',e=>{const p=pt(e);ptr.x=p.x;ptr.y=p.y;ptr.on=true;});
msg.addEventListener('pointerdown',e=>{e.preventDefault();reset(demo);});
draw();
if(/[?&]auto/.test(location.search)) reset(true);
else { msg.classList.remove('hide'); }
</script>
</body>
</html>
