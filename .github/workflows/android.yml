name: Build Android APK

on:
  push:
    paths:
      - 'focus-flow-android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: focus-flow-android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: focus-flow-apk
          path: focus-flow-android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "Focus & Flow – Android (latest)"
          body: "Latest Focus & Flow Android app. Download app-debug.apk on your phone and open it to install (allow install from unknown sources)."
          files: focus-flow-android/app/build/outputs/apk/debug/app-debug.apk
