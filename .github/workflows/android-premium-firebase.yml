name: Build Premium AAB (Firebase address)

# PREMIUM release build for Google Play CLOSED TESTING that loads the Firebase
# Hosting address (project-savvy-914a1.web.app) where sign-in works (authorised
# domain). Same app (applicationId app.ainative.focusflow), higher versionCode
# than the previous premium upload (1025 -> 1026) so it supersedes it on the
# closed-testing track. Run by hand from the Actions tab.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Point this build at the Firebase address + bump the version
        working-directory: focus-flow-android
        run: |
          set -e
          sed -i 's#https://scubadiverse.github.io/focus-flow/#https://project-savvy-914a1.web.app#' \
            app/src/main/java/net/scubadiverse/focusflow/MainActivity.kt
          sed -i 's#versionCode 24#versionCode 1028#' app/build.gradle
          echo "Patched URL + versionCode. Check:"
          grep -n "loadUrl(" app/src/main/java/net/scubadiverse/focusflow/MainActivity.kt
          grep -n "versionCode" app/build.gradle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build release AAB
        working-directory: focus-flow-android
        run: gradle bundleRelease --no-daemon --stacktrace

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: projectsavvy-premium-firebase-aab
          path: focus-flow-android/app/build/outputs/bundle/release/app-release.aab

      - name: Publish AAB to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-premium-firebase
          name: "ProjectSavvy - Premium (Firebase address, closed testing)"
          body: |
            PREMIUM build for Google Play CLOSED TESTING that loads
            project-savvy-914a1.web.app (sign-in works there). versionCode 1028,
            supersedes the previous premium upload (1027). Upload app-release.aab to
            the Closed testing track. Do NOT promote to production.
          files: |
            focus-flow-android/app/build/outputs/bundle/release/app-release.aab
